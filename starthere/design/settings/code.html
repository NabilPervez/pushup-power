<p class="text-on-surface-variant mt-2 font-medium">Fine-tune your performance and data.</p>

<div class="flex items-center gap-2 mb-2">
<span class="material-symbols-outlined text-primary" data-icon="schedule">schedule</span>
<h3 class="text-lg font-bold tracking-tight uppercase text-on-surface-variant text-[11px] tracking-[0.1em]">Schedule</h3>
</div>

</div>
<div class="bg-surface-container-lowest p-6 rounded-xl ambient-glow flex flex-col gap-3">

</div>

</div>
